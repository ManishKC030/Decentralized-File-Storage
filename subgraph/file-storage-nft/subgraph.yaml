specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: FileStorageNFT
    network: sepolia
    source:
      address: "0x40db7DbB7CeF6705b10a8dc7C871A984000B2Ff3"
      abi: FileStorageNFT
      startBlock: 11268531
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - File
      abis:
        - name: FileStorageNFT
          file: ./abis/FileStorageNFT.json
      eventHandlers:
        - event: FileUploaded(indexed uint256,indexed address,string,string)
          handler: handleFileUploaded
      file: ./src/file-storage-nft.ts
