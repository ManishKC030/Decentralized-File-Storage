specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: FileStorageNFT
    network: sepolia
    source:
      address: "0x40db7DbB7CeF6705b10a8dc7C871A984000B2Ff3"
      abi: FileStorageNFT
      startBlock: 11268531
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Approval
        - ApprovalForAll
        - FileUploaded
        - OwnershipTransferred
        - Transfer
      abis:
        - name: FileStorageNFT
          file: ./abis/FileStorageNFT.json
      eventHandlers:
        - event: Approval(indexed address,indexed address,indexed uint256)
          handler: handleApproval
        - event: ApprovalForAll(indexed address,indexed address,bool)
          handler: handleApprovalForAll
        - event: FileUploaded(indexed uint256,indexed address,string,string)
          handler: handleFileUploaded
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/file-storage-nft.ts
